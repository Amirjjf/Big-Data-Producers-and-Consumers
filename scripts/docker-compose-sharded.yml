services:
  configsvr1:
    image: mongo:7
    container_name: mysimbdp-configsvr1
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27019:27019"
    volumes:
      - configsvr1_data:/data/configdb

  configsvr2:
    image: mongo:7
    container_name: mysimbdp-configsvr2
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - configsvr2_data:/data/configdb

  configsvr3:
    image: mongo:7
    container_name: mysimbdp-configsvr3
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - configsvr3_data:/data/configdb

  shard1a:
    image: mongo:7
    container_name: mysimbdp-shard1a
    command: ["mongod", "--shardsvr", "--replSet", "shard1", "--port", "27021", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27021:27021"
    volumes:
      - shard1a_data:/data/db

  shard1b:
    image: mongo:7
    container_name: mysimbdp-shard1b
    command: ["mongod", "--shardsvr", "--replSet", "shard1", "--port", "27021", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - shard1b_data:/data/db

  shard1c:
    image: mongo:7
    container_name: mysimbdp-shard1c
    command: ["mongod", "--shardsvr", "--replSet", "shard1", "--port", "27021", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - shard1c_data:/data/db

  shard2a:
    image: mongo:7
    container_name: mysimbdp-shard2a
    command: ["mongod", "--shardsvr", "--replSet", "shard2", "--port", "27022", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27022:27022"
    volumes:
      - shard2a_data:/data/db

  shard2b:
    image: mongo:7
    container_name: mysimbdp-shard2b
    command: ["mongod", "--shardsvr", "--replSet", "shard2", "--port", "27022", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - shard2b_data:/data/db

  shard2c:
    image: mongo:7
    container_name: mysimbdp-shard2c
    command: ["mongod", "--shardsvr", "--replSet", "shard2", "--port", "27022", "--bind_ip_all"]
    restart: unless-stopped
    volumes:
      - shard2c_data:/data/db

  mongos:
    image: mongo:7
    container_name: mysimbdp-mongos
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1a
      - shard1b
      - shard1c
      - shard2a
      - shard2b
      - shard2c
    command: ["mongos", "--configdb", "configReplSet/configsvr1:27019,configsvr2:27019,configsvr3:27019", "--bind_ip_all", "--port", "27018"]
    restart: unless-stopped
    ports:
      - "27018:27018"

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1a_data:
  shard1b_data:
  shard1c_data:
  shard2a_data:
  shard2b_data:
  shard2c_data:
